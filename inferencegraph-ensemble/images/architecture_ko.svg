<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow-ko" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <filter id="shadow-ko" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#212529">KServe InferenceGraph Architecture</text>

  <!-- Step 1 Box -->
  <rect x="30" y="50" width="400" height="350" rx="10" fill="white" stroke="#4dabf7" stroke-width="2" filter="url(#shadow-ko)"/>
  <text x="230" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#1971c2">Step 1: Ensemble</text>

  <!-- Step 1: Client -->
  <rect x="180" y="95" width="100" height="32" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="230" y="116" text-anchor="middle" font-weight="600" fill="#1971c2">Client</text>

  <!-- Arrow -->
  <line x1="230" y1="127" x2="230" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>

  <!-- Step 1: Ensemble Router -->
  <rect x="155" y="152" width="150" height="36" rx="8" fill="#d0ebff" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="230" y="175" text-anchor="middle" font-weight="600" fill="#1864ab">Ensemble Router</text>

  <!-- Fork arrows -->
  <line x1="195" y1="188" x2="145" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>
  <line x1="265" y1="188" x2="315" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>
  <text x="150" y="208" font-size="11" fill="#868e96">병렬</text>
  <text x="290" y="208" font-size="11" fill="#868e96">병렬</text>

  <!-- Step 1: XGBoost -->
  <rect x="80" y="222" width="120" height="36" rx="8" fill="#fff3bf" stroke="#fcc419" stroke-width="1.5"/>
  <text x="140" y="245" text-anchor="middle" font-weight="600" fill="#e67700">XGBoost</text>

  <!-- Step 1: LightGBM -->
  <rect x="260" y="222" width="120" height="36" rx="8" fill="#d3f9d8" stroke="#51cf66" stroke-width="1.5"/>
  <text x="320" y="245" text-anchor="middle" font-weight="600" fill="#2b8a3e">LightGBM</text>

  <!-- Arrows down -->
  <line x1="140" y1="258" x2="140" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>
  <line x1="320" y1="258" x2="320" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>

  <!-- Step 1: Result -->
  <rect x="75" y="292" width="310" height="50" rx="8" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4"/>
  <text x="230" y="312" text-anchor="middle" font-size="12" fill="#495057">{"0": {xgboost...}, "1": {lightgbm...}}</text>
  <text x="230" y="332" text-anchor="middle" font-size="12" font-weight="600" fill="#495057">각 모델 결과를 개별 반환</text>

  <!-- Step 2 Box -->
  <rect x="470" y="50" width="400" height="350" rx="10" fill="white" stroke="#9775fa" stroke-width="2" filter="url(#shadow-ko)"/>
  <text x="670" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#7048e8">Step 2: Sequence + Combiner</text>

  <!-- Step 2: Client -->
  <rect x="620" y="95" width="100" height="32" rx="6" fill="#f3f0ff" stroke="#b197fc" stroke-width="1.5"/>
  <text x="670" y="116" text-anchor="middle" font-weight="600" fill="#7048e8">Client</text>

  <!-- Arrow -->
  <line x1="670" y1="127" x2="670" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>

  <!-- Step 2: Sequence Router -->
  <rect x="595" y="152" width="150" height="36" rx="8" fill="#e5dbff" stroke="#9775fa" stroke-width="1.5"/>
  <text x="670" y="175" text-anchor="middle" font-weight="600" fill="#6741d9">Sequence Router</text>

  <!-- Arrow -->
  <line x1="670" y1="188" x2="670" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>

  <!-- Step 2: Ensemble Node -->
  <rect x="590" y="212" width="160" height="32" rx="8" fill="#d0ebff" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="670" y="233" text-anchor="middle" font-size="13" font-weight="600" fill="#1864ab">Ensemble Node</text>

  <!-- Fork arrows -->
  <line x1="635" y1="244" x2="590" y2="264" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>
  <line x1="705" y1="244" x2="750" y2="264" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>

  <!-- Step 2: XGBoost -->
  <rect x="520" y="268" width="105" height="30" rx="6" fill="#fff3bf" stroke="#fcc419" stroke-width="1.5"/>
  <text x="572" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#e67700">XGBoost</text>

  <!-- Step 2: LightGBM -->
  <rect x="695" y="268" width="105" height="30" rx="6" fill="#d3f9d8" stroke="#51cf66" stroke-width="1.5"/>
  <text x="747" y="288" text-anchor="middle" font-size="12" font-weight="600" fill="#2b8a3e">LightGBM</text>

  <!-- Merge arrows -->
  <line x1="572" y1="298" x2="635" y2="318" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>
  <line x1="747" y1="298" x2="705" y2="318" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>
  <text x="670" y="314" text-anchor="middle" font-size="10" fill="#868e96">data: $response</text>

  <!-- Step 2: Combiner -->
  <rect x="610" y="322" width="120" height="32" rx="8" fill="#ffe3e3" stroke="#ff8787" stroke-width="1.5"/>
  <text x="670" y="343" text-anchor="middle" font-weight="600" fill="#c92a2a">Combiner</text>

  <!-- Arrow -->
  <line x1="670" y1="354" x2="670" y2="374" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ko)"/>

  <!-- Step 2: Result -->
  <rect x="580" y="378" width="180" height="28" rx="6" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4"/>
  <text x="670" y="397" text-anchor="middle" font-size="12" font-weight="600" fill="#495057">{"data": [3.44]} 단일 값</text>
</svg>
