<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="'Segoe UI', Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arrow-ige" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="380" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Sequence + Combiner InferenceGraph</text>

  <!-- Root: Sequence Router -->
  <rect x="175" y="48" width="170" height="36" rx="8" fill="#e5dbff" stroke="#9775fa" stroke-width="2"/>
  <text x="260" y="71" text-anchor="middle" font-weight="700" fill="#6741d9">root (Sequence)</text>

  <!-- Arrow down to ensemble-node -->
  <line x1="260" y1="84" x2="260" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ige)"/>

  <!-- Ensemble Node box -->
  <rect x="60" y="114" width="400" height="150" rx="10" fill="white" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="260" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1971c2">ensemble-node (Ensemble)</text>

  <!-- Fork arrows inside ensemble -->
  <line x1="200" y1="148" x2="145" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ige)"/>
  <line x1="320" y1="148" x2="375" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ige)"/>
  <text x="140" y="168" font-size="11" fill="#868e96">parallel</text>
  <text x="345" y="168" font-size="11" fill="#868e96">parallel</text>

  <!-- XGBoost -->
  <rect x="80" y="180" width="140" height="34" rx="8" fill="#fff3bf" stroke="#fcc419" stroke-width="1.5"/>
  <text x="150" y="202" text-anchor="middle" font-weight="600" fill="#e67700">XGBoost</text>

  <!-- LightGBM -->
  <rect x="300" y="180" width="140" height="34" rx="8" fill="#d3f9d8" stroke="#51cf66" stroke-width="1.5"/>
  <text x="370" y="202" text-anchor="middle" font-weight="600" fill="#2b8a3e">LightGBM</text>

  <!-- Merge arrows -->
  <line x1="150" y1="214" x2="220" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ige)"/>
  <line x1="370" y1="214" x2="300" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-ige)"/>

  <!-- Collected result -->
  <text x="260" y="254" text-anchor="middle" font-size="12" fill="#495057" font-family="monospace">collected as {"0": ..., "1": ...}</text>

  <!-- Arrow down to combiner -->
  <line x1="260" y1="264" x2="260" y2="292" stroke="#9775fa" stroke-width="2" marker-end="url(#arrow-ige)"/>
  <text x="340" y="284" font-size="12" font-weight="600" fill="#7048e8">data: $response</text>

  <!-- Combiner -->
  <rect x="150" y="296" width="220" height="68" rx="10" fill="#ffe3e3" stroke="#ff8787" stroke-width="2"/>
  <text x="260" y="320" text-anchor="middle" font-weight="700" fill="#c92a2a">ensemble-combiner</text>
  <text x="260" y="340" text-anchor="middle" font-size="12" fill="#495057">Averages the two predictions</text>
  <text x="260" y="356" text-anchor="middle" font-size="12" font-weight="600" fill="#495057">→ Returns a single value</text>
</svg>
